name: sentio_mobile
description: Sentio — EEG-driven emotion visualization for Muse 2
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.35.5
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.3

  # Networking
  web_socket_channel: ^3.0.1
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # 3D viewer (WebGL via WebView)
  webview_flutter: ^4.8.0
  path_provider: ^2.1.4

  # Auth
  google_sign_in: ^6.2.0
  flutter_secure_storage: ^9.2.2

  # UI / icons / fonts
  google_fonts: ^6.0.0
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.0.0
  fl_chart: ^0.69.0
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
