name: sentio_mobile
description: Sentio — EEG-driven emotion visualization for Muse 2
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.35.5
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.3

  # Networking
  web_socket_channel: ^3.0.1
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # 3D viewer (WebGL via WebView)
  webview_flutter: ^4.8.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
